{{ define "main" }}
<article>
  <header class="post-header">
    <div class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02 Jan 2006" }}</time>
      {{ if .Params.readingTime }}· {{ .ReadingTime }} min{{ end }}
      {{ with .Params.tags }}
      <div class="post-tags">
        {{ range . }}<a class="tag" href="{{ "/tags/" | relURL }}{{ . | urlize }}">{{ . }}</a>{{ end }}
      </div>
      {{ end }}
    </div>
    <h1 class="post-title">{{ .Title }}</h1>
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
